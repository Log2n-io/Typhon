name: Benchmark

# OPT-IN, NON-blocking benchmark on the z1d.metal reference box. Never gates a merge.
# Triggers: add the `run-benchmark` label to a PR, or run manually with a profile.
# The reference numbers + history are published ONLY from here (z1d.metal); local /benchmark
# is dev-only and never commits. Design: claude/design/Infrastructure/ci-merge-gate.md

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Benchmark profile
        type: choice
        default: regression
        options: [regression, btree-fast, btree-medium, btree-full]
  pull_request:
    types: [labeled]            # fires once when the `run-benchmark` label is added

# contents: write — push the single history+report commit back to the PR branch.
# pull-requests: write — post/update the sticky report-link comment on the PR.
permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    # Runs ONLY on explicit opt-in — never on a normal PR/push.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'run-benchmark'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-west-1
      PROFILE: ${{ github.event.inputs.profile || 'regression' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the PR head branch so we can commit the refreshed report back to it.
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install SkyPilot
        run: python3 -m pip install --quiet "skypilot[aws]"

      - name: Run benchmark on z1d.metal
        run: |
          sky launch bench/aws/benchmark.sky.yaml --down -y \
            --env PROFILE="$PROFILE" \
            --env RUN_ID=${{ github.run_id }}

      - name: Pull results from S3
        if: always()
        run: |
          mkdir -p bench-out
          aws s3 sync "s3://typhon-traces/benchmark/${{ github.run_id }}/" bench-out/ || true

      - name: Render report on the check page
        if: always()
        env:
          # Branch the bot commits the charts to (below). Passed via env, never inlined into the
          # script body, to avoid shell injection from a crafted ref name (same hygiene as #448).
          REF: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -f bench-out/reports/latest.md ]; then
            # The report's chart links are relative (`charts/foo.svg`) — correct when latest.md is
            # viewed in the repo file browser, but broken on the Actions step summary, which has no
            # repo-relative base. Rewrite them to absolute raw URLs pinned to the branch the charts
            # are committed to (the end-of-run commit below has landed by the time this summary is
            # displayed). Only the step-summary copy is rewritten; the committed latest.md keeps its
            # relative links.
            sed "s#](charts/#](https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${REF}/benchmark/reports/charts/#g" \
              bench-out/reports/latest.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No benchmark report produced._" >> "$GITHUB_STEP_SUMMARY"
          fi

      # Publish the reference artifact: copy the z1d.metal-produced history + reports into the repo
      # and make ONE commit. No re-trigger loop — this workflow only fires on label/dispatch.
      - name: Commit refreshed reference report
        if: success()
        run: |
          [ -f bench-out/results.jsonl ] || { echo "no results to commit"; exit 0; }
          cp bench-out/results.jsonl benchmark/history/results.jsonl
          rm -rf benchmark/reports
          mkdir -p benchmark/reports
          cp -r bench-out/reports/. benchmark/reports/
          git config user.name  "typhon-benchmark-bot"
          git config user.email "noreply@typhondb.io"
          git add benchmark/history/results.jsonl benchmark/reports
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
          else
            git commit -m "benchmark: record ${PROFILE} run on z1d.metal [skip ci]"
            git push
          fi

      # Post (or update) a sticky comment on the PR linking to the committed report. Reliable on the
      # label trigger (the PR is in the event payload); best-effort on workflow_dispatch (looks up an
      # open PR for the branch, no-ops if none). Idempotent via a hidden marker so repeat runs update
      # one comment instead of spamming. Best-effort: a failed comment never fails the benchmark.
      - name: Comment report link on the PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Passed via env, never inlined into the script body, for shell-injection hygiene.
          PR_FROM_EVENT: ${{ github.event.pull_request.number }}
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          set -u
          # Only comment when THIS run produced a fresh report.
          [ -f bench-out/reports/latest.md ] || { echo "no fresh report — skipping PR comment"; exit 0; }

          # Resolve the PR number: event payload first (label trigger), else an open PR for the
          # branch (workflow_dispatch). No PR → nothing to comment on.
          PR="$PR_FROM_EVENT"
          if [ -z "$PR" ]; then
            PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$HEAD_REF" --state open --json number --jq '.[0].number // empty')
          fi
          [ -n "$PR" ] || { echo "no open PR for '$HEAD_REF' — skipping PR comment"; exit 0; }

          SHA=$(git rev-parse HEAD)          # the commit holding the refreshed report (prior step)
          SHORT=$(git rev-parse --short HEAD)
          URL="https://github.com/${GITHUB_REPOSITORY}/blob/${SHA}/benchmark/reports/latest.md"
          MARKER="<!-- typhon-benchmark-report -->"
          BODY="${MARKER} 📊 **Benchmark (\`${PROFILE}\`)** finished — [full report](${URL}) · commit \`${SHORT}\`"

          # Sticky: PATCH our previous comment if present, else POST a new one. jq reads the marker
          # from env (env.MARKER) to avoid quoting it into the filter.
          CID=$(MARKER="$MARKER" gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate \
            --jq '.[] | select(.body | contains(env.MARKER)) | .id' | head -1)
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${CID}" -f body="$BODY" \
              && echo "Updated sticky comment $CID on PR #$PR" || echo "comment update failed (non-fatal)"
          else
            gh api -X POST "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" -f body="$BODY" \
              && echo "Created sticky comment on PR #$PR" || echo "comment create failed (non-fatal)"
          fi
